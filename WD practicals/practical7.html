<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dynamic content using javascript</title>
</head>
<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        margin-top: 50px;
        background-color: #f4f4f4;
    }

    input {
        padding: 8px;
        width: 200px;
    }

    button {
        padding: 8px 12px;
        margin-left: 5px;
        cursor: pointer;
    }

    ul {
        list-style-type: none;
        padding: 0;
        margin-top: 20px;
    }

    li {
        background: white;
        margin: 5px auto;
        padding: 10px;
        width: 250px;
        border-radius: 5px;
        box-shadow: 0 0 5px rgba(0, 0, 0, 0.1);
    }
</style>

<body>
    <h1>Dynamic DOM Content</h1>

    <input type="text" id="itemInput" placeholder="Enter an item">
    <button id="clickbtn">Add Item</button>

    <ul id="itemList"></ul>

</body>
<script>
    const input = document.getElementById("itemInput");
    const btn = document.getElementById("clickbtn");
    const listcontainer = document.getElementById("itemList");

    const addlistelement = (e) => {
        let value = input.value.trim();
        if (value.length == 0) {
            alert("Please enter an item first");
        } else {
            let li = document.createElement("li");
            li.innerText = value;
            listcontainer.insertAdjacentElement("beforeend", li);
            input.value = "";
        }
    };
    btn.addEventListener("click", addlistelement); // do not need to pass () brackets to function name in this;
</script>

</html>
