<!DOCTYPE html>
<html>
<head>
    <title>Web Page with Image, Link, and Nested Table</title>
</head>
<body>

    <h1>Sample Web Page</h1>

    <!-- Image -->
    <img src="https://via.placeholder.com/200" alt="Sample Image">

    <br><br>

    <!-- Hyperlink -->
    <p>
        Visit <a href="https://www.example.com">Example Website</a>
    </p>

    <br>

    <!-- Main Table -->
    <table border="1" cellpadding="5" cellspacing="0">
        <tr>
            <th>Name</th>
            <th>Details</th>
        </tr>

        <tr>
            <td>Student 1</td>
            <td>
                <!-- Nested Table -->
                <table border="1" cellpadding="5" cellspacing="0">
                    <tr>
                        <th>Subject</th>
                        <th>Marks</th>
                    </tr>
                    <tr>
                        <td>Math</td>
                        <td>85</td>
                    </tr>
                    <tr>
                        <td>Science</td>
                        <td>90</td>
                    </tr>
                </table>
            </td>
        </tr>

        <tr>
            <td>Student 2</td>
            <td>
                <!-- Nested Table -->
                <table border="1" cellpadding="5" cellspacing="0">
                    <tr>
                        <th>Subject</th>
                        <th>Marks</th>
                    </tr>
                    <tr>
                        <td>Math</td>
                        <td>78</td>
                    </tr>
                    <tr>
                        <td>Science</td>
                        <td>88</td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>

</body>
</html>
